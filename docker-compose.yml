name: enterprise-agent

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-agent-api:latest
    container_name: enterprise-agent-api
    depends_on:
      sqlserver:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Persistence (SQL Server)
      Persistence__ConnectionString: "Server=sqlserver,1433;Database=EnterpriseAgent;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;"
      Persistence__AutoMigrate: "true"
      # Long-term / conversation memory (Redis)
      Memory__RedisConnectionString: "redis:6379"
      # Vector store (PostgreSQL + pgvector)
      VectorStore__Provider: "Postgres"
      VectorStore__Postgres__ConnectionString: "Host=postgres;Port=5432;Database=enterprise_agent;Username=postgres;Password=postgres"
      # AI provider — supply your own keys (OpenAI or Azure OpenAI).
      Ai__Provider: "${AI_PROVIDER:-}"
      Ai__OpenAI__ApiKey: "${OPENAI_API_KEY:-}"
      Ai__AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT:-}"
      Ai__AzureOpenAI__ApiKey: "${AZURE_OPENAI_API_KEY:-}"
      # Security
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-change-me-in-production-with-a-long-random-secret-000}"
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: enterprise-agent-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: enterprise-agent-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sqlserver-data:
  redis-data:
  postgres-data:
